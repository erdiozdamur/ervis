services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ervis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_production_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ervis_core}
    ports:
      - target: 5432
        published: "${POSTGRES_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      POSTGRES_USER: ${POSTGRES_USER:-ervis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_production_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ervis_core}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-env}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 180s
    ports:
      - target: 8000
        published: "${BACKEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-backend:8000}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50M}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - target: 80
        published: "${FRONTEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    restart: unless-stopped

volumes:
  pgdata:
