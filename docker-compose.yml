services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - target: 8000
        published: "${BACKEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - target: 80
        published: "${FRONTEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    restart: unless-stopped
