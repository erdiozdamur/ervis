services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ervis}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ervis}"
      POSTGRES_DB: "${POSTGRES_DB:-ervis}"
    ports:
      - target: 5432
        published: "${POSTGRES_HOST_PORT:-0}"
        host_ip: "${POSTGRES_BIND_IP:-127.0.0.1}"
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ervis} -d ${POSTGRES_DB:-ervis}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  migrator:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ervis}:${POSTGRES_PASSWORD:-ervis}@postgres:5432/${POSTGRES_DB:-ervis}?schema=public"
      ALLOW_DESTRUCTIVE_BASELINE_RESET: "${ALLOW_DESTRUCTIVE_BASELINE_RESET:-false}"
    command: ["npm", "run", "db:migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_ENV: "${APP_ENV:-development}"
      DATABASE_URL: "${DATABASE_URL:-}"
      POSTGRES_USER: "${POSTGRES_USER:-ervis}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ervis}"
      POSTGRES_DB: "${POSTGRES_DB:-ervis}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:80,http://127.0.0.1:80}"
    ports:
      - target: 8000
        published: "${BACKEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      APP_ENV: "${APP_ENV:-development}"
      NODE_ENV: "production"
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ervis}:${POSTGRES_PASSWORD:-ervis}@postgres:5432/${POSTGRES_DB:-ervis}?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-}"
      AUTH_TRUST_HOST: "${AUTH_TRUST_HOST:-true}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-}"
      AUTH_SESSION_MAX_AGE_DAYS: "${AUTH_SESSION_MAX_AGE_DAYS:-30}"
      AUTH_URL: "${AUTH_URL:-}"
      APP_TIME_ZONE: "${APP_TIME_ZONE:-Europe/Istanbul}"
      TZ: "${TZ:-Europe/Istanbul}"
      APPLY_MIGRATIONS_ON_STARTUP: "false"
      WAIT_FOR_DATABASE_ON_STARTUP: "${WAIT_FOR_DATABASE_ON_STARTUP:-true}"
      STARTUP_DB_WAIT_TIMEOUT_MS: "${STARTUP_DB_WAIT_TIMEOUT_MS:-60000}"
      STARTUP_DB_WAIT_INTERVAL_MS: "${STARTUP_DB_WAIT_INTERVAL_MS:-2000}"
      POSTGRES_USER: "${POSTGRES_USER:-ervis}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ervis}"
      POSTGRES_DB: "${POSTGRES_DB:-ervis}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      AI_PROVIDER: "${AI_PROVIDER:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      OPENAI_TRANSCRIPTION_MODEL: "${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}"
      AI_ANALYSIS_PROMPT_VERSION: "${AI_ANALYSIS_PROMPT_VERSION:-meal-intake-v1}"
      MEAL_ANALYSIS_STAGE1_MODEL: "${MEAL_ANALYSIS_STAGE1_MODEL:-gpt-4.1-mini}"
      MEAL_ANALYSIS_STAGE2_MODEL: "${MEAL_ANALYSIS_STAGE2_MODEL:-gpt-4.1-mini}"
    ports:
      - target: 3000
        published: "${FRONTEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "node", "-e", "const port=process.env.PORT||'3000'; fetch('http://127.0.0.1:'+port+'/healthz').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${DOKPLOY_NETWORK_NAME:-dokploy-network}"
      - "traefik.http.routers.${APP_NAME:-ervis}-web.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.${APP_NAME:-ervis}-web.entrypoints=web"
      - "traefik.http.routers.${APP_NAME:-ervis}-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.${APP_NAME:-ervis}-web.service=${APP_NAME:-ervis}-web"
      - "traefik.http.services.${APP_NAME:-ervis}-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.${APP_NAME:-ervis}-websecure.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.${APP_NAME:-ervis}-websecure.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-ervis}-websecure.service=${APP_NAME:-ervis}-websecure"
      - "traefik.http.routers.${APP_NAME:-ervis}-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_NAME:-ervis}-websecure.loadbalancer.server.port=3000"
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dokploy-network:
    external: true
    name: "${DOKPLOY_NETWORK_NAME:-dokploy-network}"
