services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ervis}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ervis}"
      POSTGRES_DB: "${POSTGRES_DB:-ervis}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ervis} -d ${POSTGRES_DB:-ervis}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  migrator:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ervis}:${POSTGRES_PASSWORD:-ervis}@postgres:5432/${POSTGRES_DB:-ervis}"
    command: ["npm", "run", "db:migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - target: 8000
        published: "${BACKEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ervis}:${POSTGRES_PASSWORD:-ervis}@postgres:5432/${POSTGRES_DB:-ervis}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-}"
      AUTH_TRUST_HOST: "${AUTH_TRUST_HOST:-true}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost}"
      AUTH_URL: "${AUTH_URL:-}"
      POSTGRES_USER: "${POSTGRES_USER:-ervis}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ervis}"
      POSTGRES_DB: "${POSTGRES_DB:-ervis}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    ports:
      - target: 3000
        published: "${FRONTEND_HOST_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
